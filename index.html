<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        img {
            margin: 10px;
            transition: transform 0.2s;
        }
        img:hover {
            transform: scale(1.1);
        }
        .tooltip {
            visibility: hidden;
            position: absolute;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 5px;
            z-index: 1;
        }
        img:hover + .tooltip {
            visibility: visible;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <img src="image1.jpg" alt="Image 1" onclick="showTooltip(this.src)" onmouseover="showTooltip(this.src)">
        <span class="tooltip"></span>

        <img src="image2.jpg" alt="Image 2" onclick="showTooltip(this.src)" onmouseover="showTooltip(this.src)">
        <span class="tooltip"></span>

        <script>
            function showTooltip(src) {
                const tooltip = document.querySelector('.tooltip');
                tooltip.textContent = src;
                tooltip.style.visibility = 'visible';
                tooltip.style.left = event.pageX + 'px';
                tooltip.style.top = event.pageY + 'px';
            }
        </script>
    </div>
</body>
</html>
